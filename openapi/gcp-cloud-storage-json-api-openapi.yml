components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication for Google Cloud APIs
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/devstorage.full_control: Full control of Cloud Storage resources
            https://www.googleapis.com/auth/devstorage.read_only: View your data in Cloud Storage
            https://www.googleapis.com/auth/devstorage.read_write: Manage your data in Cloud Storage
            https://www.googleapis.com/auth/cloud-platform: View and manage your data across Google Cloud services
            https://www.googleapis.com/auth/cloud-platform.read-only: View your data across Google Cloud services
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Bearer token authentication using a Google Cloud access token
        obtained via service account or user credentials.

  parameters:
    bucketName:
      name: bucket
      in: path
      required: true
      description: >-
        Name of the bucket. Bucket names must be globally unique and
        comply with naming requirements.
      schema:
        type: string
      example: my-bucket
    objectName:
      name: object
      in: path
      required: true
      description: >-
        Name of the object. For information about how to URL-encode
        object names to be path safe, see Encoding URI path parts.
      schema:
        type: string
      example: my-object.txt
    entity:
      name: entity
      in: path
      required: true
      description: >-
        The entity holding the permission, in one of the following
        forms: user-userId, user-email, group-groupId, group-email,
        domain-domain, project-team-projectId, allUsers, or
        allAuthenticatedUsers.
      schema:
        type: string
      example: user-example@gmail.com
    fields:
      name: fields
      in: query
      required: false
      description: >-
        Selector specifying a subset of fields to include in the
        response. Use for better performance by retrieving only needed
        fields.
      schema:
        type: string
    prettyPrint:
      name: prettyPrint
      in: query
      required: false
      description: >-
        Returns response with indentations and line breaks. Default
        is true. When set to false, can reduce the response payload size.
      schema:
        type: boolean
        default: true
    userProject:
      name: userProject
      in: query
      required: false
      description: >-
        The project to be billed for this request. Required for Requester
        Pays buckets.
      schema:
        type: string

  responses:
    BadRequest:
      description: >-
        Bad Request. The request was malformed or contained invalid
        parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Unauthorized. Authentication credentials were missing or
        invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >-
        Forbidden. The authenticated user does not have permission
        to perform the requested operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: >-
        Not Found. The specified resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PreconditionFailed:
      description: >-
        Precondition Failed. The condition set in the conditional
        request header was not met.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Bucket:
      type: object
      description: >-
        A bucket is a container for objects stored in Cloud Storage.
        Buckets are associated with a project and have globally unique
        names.
      properties:
        kind:
          type: string
          description: The kind of item this is. For buckets, this is always storage#bucket.
          default: storage#bucket
          readOnly: true
        id:
          type: string
          description: The ID of the bucket. For buckets, this is the same as the name.
          readOnly: true
          examples:
            - my-bucket
        selfLink:
          type: string
          format: uri
          description: The URI of this bucket.
          readOnly: true
        projectNumber:
          type: string
          description: The project number of the project the bucket belongs to.
          readOnly: true
        name:
          type: string
          description: >-
            The name of the bucket. Bucket names must be globally unique
            and conform to naming requirements (3-63 characters, lowercase
            letters, numbers, hyphens, and dots).
          minLength: 3
          maxLength: 63
          examples:
            - my-bucket
            - example-project-data
        timeCreated:
          type: string
          format: date-time
          description: The creation time of the bucket in RFC 3339 format.
          readOnly: true
          examples:
            - '2024-01-15T09:00:00.000Z'
        updated:
          type: string
          format: date-time
          description: The modification time of the bucket in RFC 3339 format.
          readOnly: true
        metageneration:
          type: string
          description: >-
            The metadata generation of this bucket. Used for preconditions
            and for detecting changes in metadata.
          readOnly: true
        location:
          type: string
          description: >-
            The location of the bucket. Object data for objects in the
            bucket resides in physical storage within this region.
          examples:
            - US
            - US-EAST1
            - EUROPE-WEST1
        locationType:
          type: string
          description: The type of location the bucket resides in.
          enum:
            - multi-region
            - region
            - dual-region
          readOnly: true
        storageClass:
          type: string
          description: >-
            The default storage class of the bucket, used for newly
            created objects.
          enum:
            - STANDARD
            - NEARLINE
            - COLDLINE
            - ARCHIVE
          examples:
            - STANDARD
        etag:
          type: string
          description: HTTP 1.1 Entity tag for the bucket.
          readOnly: true
        defaultEventBasedHold:
          type: boolean
          description: >-
            Whether or not to automatically apply an event-based hold
            to new objects added to the bucket.
        rpo:
          type: string
          description: >-
            The Recovery Point Objective (RPO) of this bucket.
            Set to ASYNC_TURBO to turn on Turbo Replication for
            dual-region buckets.
          enum:
            - DEFAULT
            - ASYNC_TURBO
        acl:
          type: array
          description: Access controls on the bucket.
          items:
            $ref: '#/components/schemas/BucketAccessControl'
        defaultObjectAcl:
          type: array
          description: >-
            Default access controls to apply to new objects when no ACL
            is provided.
          items:
            $ref: '#/components/schemas/ObjectAccessControl'
        iamConfiguration:
          type: object
          description: The bucket's IAM configuration.
          properties:
            uniformBucketLevelAccess:
              type: object
              description: >-
                The bucket's uniform bucket-level access configuration.
                When enabled, access is controlled through IAM policies
                only and ACLs are disabled.
              properties:
                enabled:
                  type: boolean
                  description: Whether uniform bucket-level access is enabled.
                lockedTime:
                  type: string
                  format: date-time
                  description: >-
                    The deadline for changing the uniform bucket-level
                    access setting. After this time, the setting becomes
                    permanent.
            publicAccessPrevention:
              type: string
              description: >-
                The bucket's public access prevention configuration.
              enum:
                - inherited
                - enforced
        encryption:
          type: object
          description: Encryption configuration for a bucket.
          properties:
            defaultKmsKeyName:
              type: string
              description: >-
                A Cloud KMS key that will be used to encrypt objects
                inserted into this bucket, if no encryption method
                is specified.
        lifecycle:
          type: object
          description: >-
            The bucket's lifecycle configuration. Lifecycle rules
            automatically manage objects based on conditions.
          properties:
            rule:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: object
                    description: The action to take when lifecycle conditions are met.
                    properties:
                      type:
                        type: string
                        description: Type of the action.
                        enum:
                          - Delete
                          - SetStorageClass
                          - AbortIncompleteMultipartUpload
                      storageClass:
                        type: string
                        description: >-
                          Target storage class. Required when action
                          type is SetStorageClass.
                  condition:
                    type: object
                    description: The condition(s) under which the action will be taken.
                    properties:
                      age:
                        type: integer
                        description: Age of an object in days.
                      createdBefore:
                        type: string
                        format: date
                        description: >-
                          A date in RFC 3339 format. Applies to objects
                          created before this date.
                      customTimeBefore:
                        type: string
                        format: date
                        description: >-
                          A date in RFC 3339 format. Applies to objects
                          with a custom time before this date.
                      daysSinceCustomTime:
                        type: integer
                        description: >-
                          Number of days elapsed since the custom time.
                      daysSinceNoncurrentTime:
                        type: integer
                        description: >-
                          Number of days elapsed since the noncurrent
                          timestamp.
                      isLive:
                        type: boolean
                        description: >-
                          Relevant only for versioned objects. true for
                          live objects, false for noncurrent objects.
                      matchesPattern:
                        type: string
                        description: >-
                          A regular expression that satisfies RE2 syntax.
                      matchesPrefix:
                        type: array
                        items:
                          type: string
                        description: >-
                          Objects having names with the listed prefixes
                          satisfy this condition.
                      matchesSuffix:
                        type: array
                        items:
                          type: string
                        description: >-
                          Objects having names with the listed suffixes
                          satisfy this condition.
                      matchesStorageClass:
                        type: array
                        items:
                          type: string
                        description: >-
                          Objects having any of the listed storage
                          classes satisfy this condition.
                      noncurrentTimeBefore:
                        type: string
                        format: date
                        description: >-
                          A date in RFC 3339 format. Applies to the
                          noncurrent time of an object.
                      numNewerVersions:
                        type: integer
                        description: >-
                          Relevant only for versioned objects. The number
                          of newer versions of an object.
        logging:
          type: object
          description: The bucket's logging configuration.
          properties:
            logBucket:
              type: string
              description: The destination bucket for access logs.
            logObjectPrefix:
              type: string
              description: >-
                A prefix for log object names. Defaults to the name
                of the source bucket.
        versioning:
          type: object
          description: >-
            The bucket's versioning configuration. When enabled,
            Cloud Storage retains a noncurrent object version when
            the live object is deleted or overwritten.
          properties:
            enabled:
              type: boolean
              description: Whether versioning is enabled.
        website:
          type: object
          description: The bucket's website configuration for static website hosting.
          properties:
            mainPageSuffix:
              type: string
              description: >-
                If the requested object path is missing, the service
                will ensure the path has a trailing slash and then
                append this suffix.
            notFoundPage:
              type: string
              description: >-
                If the requested object path is missing and there is
                no mainPageSuffix, the service returns the named
                object as the content for a 404 Not Found result.
        cors:
          type: array
          description: >-
            The bucket's Cross-Origin Resource Sharing (CORS)
            configuration.
          items:
            type: object
            properties:
              origin:
                type: array
                items:
                  type: string
                description: >-
                  The list of Origins eligible to receive CORS
                  response headers.
              method:
                type: array
                items:
                  type: string
                description: >-
                  The list of HTTP methods on which to include CORS
                  response headers.
              responseHeader:
                type: array
                items:
                  type: string
                description: >-
                  The list of HTTP headers other than the simple
                  response headers to give permission for the
                  user-agent to share across domains.
              maxAgeSeconds:
                type: integer
                description: >-
                  The value in seconds to return in the
                  Access-Control-Max-Age header.
        retentionPolicy:
          type: object
          description: >-
            The bucket's retention policy, which defines the minimum
            age an object must reach before it can be deleted or
            replaced.
          properties:
            retentionPeriod:
              type: string
              description: >-
                The duration in seconds that objects must be retained.
                Retention duration must be greater than zero and less
                than 100 years.
            effectiveTime:
              type: string
              format: date-time
              description: >-
                The earliest date at which the retention policy was
                effective.
              readOnly: true
            isLocked:
              type: boolean
              description: >-
                Whether the retention policy is locked. Once locked,
                the policy cannot be removed or the retention period
                shortened.
              readOnly: true
        softDeletePolicy:
          type: object
          description: The bucket's soft delete policy.
          properties:
            retentionDurationSeconds:
              type: string
              description: >-
                The number of seconds that soft-deleted objects will
                be retained and are recoverable. Value must be at
                least 604800 (7 days).
            effectiveTime:
              type: string
              format: date-time
              description: >-
                The time from which the soft delete policy became or
                will become effective.
              readOnly: true
        autoclass:
          type: object
          description: >-
            The bucket's Autoclass configuration. Autoclass
            automatically transitions objects to appropriate storage
            classes based on access patterns.
          properties:
            enabled:
              type: boolean
              description: Whether Autoclass is enabled for this bucket.
            toggleTime:
              type: string
              format: date-time
              description: >-
                The time at which Autoclass was last enabled or disabled.
              readOnly: true
            terminalStorageClass:
              type: string
              description: >-
                The storage class that objects in the bucket will
                eventually transition to if not accessed.
              enum:
                - NEARLINE
                - ARCHIVE
            terminalStorageClassUpdateTime:
              type: string
              format: date-time
              description: >-
                The time at which the terminal storage class was last
                updated.
              readOnly: true
        hierarchicalNamespace:
          type: object
          description: >-
            The bucket's hierarchical namespace configuration for
            folder support.
          properties:
            enabled:
              type: boolean
              description: >-
                Whether hierarchical namespace is enabled for the bucket.
        labels:
          type: object
          description: >-
            User-provided labels, in key/value pairs. Keys and values
            must both be 63 characters or less and must conform to
            RFC 1035.
          additionalProperties:
            type: string
        customPlacementConfig:
          type: object
          description: >-
            The bucket's custom placement configuration for
            dual-region buckets.
          properties:
            dataLocations:
              type: array
              items:
                type: string
              description: >-
                The list of regional locations in which data is placed.
        satisfiesPZS:
          type: boolean
          description: >-
            Whether the bucket satisfies the zone separation
            requirements for compliance.
          readOnly: true
      required:
        - name

    Object:
      type: object
      description: >-
        An object in Cloud Storage. Objects are the individual pieces
        of data that you store in Cloud Storage.
      properties:
        kind:
          type: string
          description: The kind of item this is. For objects, this is always storage#object.
          default: storage#object
          readOnly: true
        id:
          type: string
          description: >-
            The ID of the object, including the bucket name, object
            name, and generation number.
          readOnly: true
        selfLink:
          type: string
          format: uri
          description: The link to this object.
          readOnly: true
        mediaLink:
          type: string
          format: uri
          description: The link to download the object's data.
          readOnly: true
        name:
          type: string
          description: The name of the object.
          examples:
            - my-object.txt
            - images/photo.jpg
        bucket:
          type: string
          description: The name of the bucket containing this object.
        generation:
          type: string
          description: >-
            The content generation of this object. Used for object
            versioning.
          readOnly: true
        metageneration:
          type: string
          description: >-
            The version of the metadata for this object. Used for
            preconditions and detecting metadata changes.
          readOnly: true
        contentType:
          type: string
          description: Content-Type of the object data.
          examples:
            - application/octet-stream
            - text/plain
            - image/jpeg
        timeCreated:
          type: string
          format: date-time
          description: The creation time of the object in RFC 3339 format.
          readOnly: true
        updated:
          type: string
          format: date-time
          description: >-
            The modification time of the object metadata in RFC 3339
            format.
          readOnly: true
        timeDeleted:
          type: ['string', 'null']
          format: date-time
          description: >-
            The deletion time of the object in RFC 3339 format. Set
            only when the object is noncurrent.
          readOnly: true
        temporaryHold:
          type: boolean
          description: Whether the object is under a temporary hold.
        eventBasedHold:
          type: boolean
          description: Whether the object is under an event-based hold.
        retentionExpirationTime:
          type: ['string', 'null']
          format: date-time
          description: >-
            The earliest time that the object can be deleted or replaced,
            based on the retention policy.
          readOnly: true
        storageClass:
          type: string
          description: Storage class of the object.
          enum:
            - STANDARD
            - NEARLINE
            - COLDLINE
            - ARCHIVE
        timeStorageClassUpdated:
          type: string
          format: date-time
          description: >-
            The time at which the object's storage class was last
            changed.
          readOnly: true
        size:
          type: string
          description: Content-Length of the data in bytes.
          readOnly: true
        md5Hash:
          type: string
          description: >-
            MD5 hash of the data, encoded using base64. Not available
            for composite objects.
          readOnly: true
        crc32c:
          type: string
          description: CRC32c checksum, encoded using base64.
          readOnly: true
        etag:
          type: string
          description: HTTP 1.1 Entity tag for the object.
          readOnly: true
        componentCount:
          type: integer
          description: >-
            Number of underlying components that make up a composite
            object.
          readOnly: true
        contentEncoding:
          type: string
          description: Content-Encoding of the object data.
        contentDisposition:
          type: string
          description: Content-Disposition of the object data.
        contentLanguage:
          type: string
          description: Content-Language of the object data.
        cacheControl:
          type: string
          description: Cache-Control directive for the object data.
          examples:
            - public, max-age=3600
            - no-cache
        metadata:
          type: object
          description: >-
            User-provided metadata in key/value pairs.
          additionalProperties:
            type: string
        acl:
          type: array
          description: Access controls on the object.
          items:
            $ref: '#/components/schemas/ObjectAccessControl'
        owner:
          type: object
          description: The owner of the object.
          readOnly: true
          properties:
            entity:
              type: string
              description: The entity in the form user-userId.
            entityId:
              type: string
              description: The ID for the entity.
        customerEncryption:
          type: object
          description: >-
            Metadata of customer-supplied encryption key, if the object
            is encrypted by such a key.
          readOnly: true
          properties:
            encryptionAlgorithm:
              type: string
              description: The encryption algorithm.
            keySha256:
              type: string
              description: >-
                SHA256 hash of the encryption key.
        kmsKeyName:
          type: string
          description: >-
            Cloud KMS key used to encrypt the object, if one has been
            specified.
        customTime:
          type: string
          format: date-time
          description: >-
            A timestamp in RFC 3339 format specified by the user for
            an object. Typically set to enable lifecycle management
            conditions based on custom time.
        softDeleteTime:
          type: ['string', 'null']
          format: date-time
          description: >-
            The time at which the object was soft-deleted, if applicable.
          readOnly: true
        hardDeleteTime:
          type: ['string', 'null']
          format: date-time
          description: >-
            The time at which the soft-deleted object will be permanently
            deleted.
          readOnly: true

    BucketList:
      type: object
      description: A list of buckets.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#buckets
        nextPageToken:
          type: string
          description: >-
            The continuation token. Provide this value as the pageToken
            in a subsequent request to return the next page of results.
        items:
          type: array
          description: The list of buckets.
          items:
            $ref: '#/components/schemas/Bucket'

    ObjectList:
      type: object
      description: A list of objects.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#objects
        nextPageToken:
          type: string
          description: >-
            The continuation token. Provide this value as the pageToken
            in a subsequent request to return the next page of results.
        prefixes:
          type: array
          description: >-
            The list of prefixes of objects matching-but-not-listed up
            to and including the requested delimiter.
          items:
            type: string
        items:
          type: array
          description: The list of objects.
          items:
            $ref: '#/components/schemas/Object'

    BucketAccessControl:
      type: object
      description: An access-control entry for a bucket.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#bucketAccessControl
          readOnly: true
        id:
          type: string
          description: The ID of the access-control entry.
          readOnly: true
        selfLink:
          type: string
          format: uri
          description: The link to this access-control entry.
          readOnly: true
        bucket:
          type: string
          description: The name of the bucket.
        entity:
          type: string
          description: >-
            The entity holding the permission, in one of the following
            forms: user-userId, user-email, group-groupId, group-email,
            domain-domain, project-team-projectId, allUsers, or
            allAuthenticatedUsers.
        role:
          type: string
          description: The access permission for the entity.
          enum:
            - OWNER
            - WRITER
            - READER
        email:
          type: string
          format: email
          description: The email address associated with the entity, if any.
          readOnly: true
        domain:
          type: string
          description: The domain associated with the entity, if any.
          readOnly: true
        entityId:
          type: string
          description: The ID for the entity, if any.
          readOnly: true
        etag:
          type: string
          description: HTTP 1.1 Entity tag for the access-control entry.
          readOnly: true
        projectTeam:
          type: object
          description: The project team associated with the entity, if any.
          readOnly: true
          properties:
            projectNumber:
              type: string
              description: The project number.
            team:
              type: string
              description: The team.
              enum:
                - editors
                - owners
                - viewers
      required:
        - entity
        - role

    ObjectAccessControl:
      type: object
      description: An access-control entry for an object.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#objectAccessControl
          readOnly: true
        id:
          type: string
          description: The ID of the access-control entry.
          readOnly: true
        selfLink:
          type: string
          format: uri
          description: The link to this access-control entry.
          readOnly: true
        bucket:
          type: string
          description: The name of the bucket.
        object:
          type: string
          description: The name of the object.
        generation:
          type: string
          description: The content generation of the object.
        entity:
          type: string
          description: >-
            The entity holding the permission, in one of the following
            forms: user-userId, user-email, group-groupId, group-email,
            domain-domain, project-team-projectId, allUsers, or
            allAuthenticatedUsers.
        role:
          type: string
          description: The access permission for the entity.
          enum:
            - OWNER
            - READER
        email:
          type: string
          format: email
          description: The email address associated with the entity, if any.
          readOnly: true
        domain:
          type: string
          description: The domain associated with the entity, if any.
          readOnly: true
        entityId:
          type: string
          description: The ID for the entity, if any.
          readOnly: true
        etag:
          type: string
          description: HTTP 1.1 Entity tag for the access-control entry.
          readOnly: true
        projectTeam:
          type: object
          description: The project team associated with the entity, if any.
          readOnly: true
          properties:
            projectNumber:
              type: string
              description: The project number.
            team:
              type: string
              description: The team.
              enum:
                - editors
                - owners
                - viewers
      required:
        - entity
        - role

    Policy:
      type: object
      description: An IAM policy for a Cloud Storage resource.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#policy
        resourceId:
          type: string
          description: The ID of the resource to which this policy belongs.
        version:
          type: integer
          description: >-
            The version of the policy. Valid values are 1 and 3. Any
            request that specifies conditional role bindings must specify
            version 3.
        etag:
          type: string
          description: >-
            HTTP 1.1 Entity tag for the policy. Used for optimistic
            concurrency control.
        bindings:
          type: array
          description: A list of members bound to a role.
          items:
            type: object
            properties:
              role:
                type: string
                description: >-
                  The role to which members are bound. For example,
                  roles/storage.objectViewer.
              members:
                type: array
                items:
                  type: string
                description: >-
                  The members bound to the role. Each member can be a
                  user, service account, group, or domain.
              condition:
                type: object
                description: The condition that is associated with this binding.
                properties:
                  title:
                    type: string
                  description:
                    type: string
                  expression:
                    type: string
                    description: >-
                      The condition expression in Common Expression
                      Language (CEL) syntax.

    ComposeRequest:
      type: object
      description: A request to compose objects.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#composeRequest
        destination:
          $ref: '#/components/schemas/Object'
        sourceObjects:
          type: array
          description: >-
            The list of source objects that will be concatenated into
            a single object. Maximum 32 objects.
          maxItems: 32
          items:
            type: object
            properties:
              name:
                type: string
                description: The source object's name.
              generation:
                type: string
                description: The generation of the source object.
              objectPreconditions:
                type: object
                properties:
                  ifGenerationMatch:
                    type: integer
                    format: int64
                    description: >-
                      Only perform the composition if the generation
                      of the source object matches this value.
      required:
        - sourceObjects

    Channel:
      type: object
      description: >-
        A notification channel used to watch for resource changes.
      properties:
        kind:
          type: string
          description: >-
            Identifies this as a notification channel.
          default: api#channel
        id:
          type: string
          description: >-
            A UUID or similar unique string that identifies this channel.
        resourceId:
          type: string
          description: >-
            An opaque value that identifies the watched resource.
        resourceUri:
          type: string
          format: uri
          description: A version-specific identifier for the watched resource.
        token:
          type: string
          description: >-
            An arbitrary string delivered to the target address with
            each notification.
        expiration:
          type: string
          description: >-
            Date and time of notification channel expiration,
            expressed in milliseconds since the epoch.
        type:
          type: string
          description: The type of delivery mechanism used for this channel.
          enum:
            - web_hook
        address:
          type: string
          format: uri
          description: >-
            The address where notifications are delivered for this
            channel.
        params:
          type: object
          description: Additional parameters controlling delivery channel behavior.
          additionalProperties:
            type: string
        payload:
          type: boolean
          description: >-
            Whether the payload of each notification event is expected.
      required:
        - id
        - type
        - address

    RewriteResponse:
      type: object
      description: A rewrite response.
      properties:
        kind:
          type: string
          description: The kind of item this is.
          default: storage#rewriteResponse
        totalBytesRewritten:
          type: string
          description: >-
            The total bytes rewritten so far.
        objectSize:
          type: string
          description: >-
            The total size of the object being copied.
        done:
          type: boolean
          description: >-
            Whether the rewrite is complete. If false, call the
            rewrite method again with the returned rewriteToken.
        rewriteToken:
          type: string
          description: >-
            A token to use in subsequent rewrite requests. Present
            only when the rewrite is not yet complete.
        resource:
          $ref: '#/components/schemas/Object'

    Error:
      type: object
      description: An error response from the Cloud Storage JSON API.
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              description: The HTTP status code.
            message:
              type: string
              description: A human-readable description of the error.
            errors:
              type: array
              items:
                type: object
                properties:
                  domain:
                    type: string
                  reason:
                    type: string
                  message:
                    type: string
                  locationType:
                    type: string
                  location:
                    type: string
