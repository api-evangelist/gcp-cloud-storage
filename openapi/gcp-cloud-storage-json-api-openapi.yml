openapi: 3.1.0
info:
  title: Google Cloud Storage JSON API
  description: >-
    RESTful API for managing Google Cloud Storage resources including buckets
    and objects. Cloud Storage allows you to store and retrieve data on
    Google's infrastructure with high durability, availability, and
    scalability. The JSON API provides programmatic access to create,
    configure, and manage storage buckets, upload and download objects,
    control access permissions, and manage object metadata.
  version: v1
  contact:
    name: Google Cloud Storage
    url: https://cloud.google.com/storage/docs/json_api
  termsOfService: https://cloud.google.com/terms
  license:
    name: Creative Commons Attribution 4.0
    url: https://creativecommons.org/licenses/by/4.0/
externalDocs:
  description: Google Cloud Storage JSON API Documentation
  url: https://cloud.google.com/storage/docs/json_api/v1
servers:
  - url: https://storage.googleapis.com/storage/v1
    description: Google Cloud Storage JSON API v1
tags:
  - name: Buckets
    description: Operations for managing Cloud Storage buckets
  - name: Objects
    description: Operations for managing objects within Cloud Storage buckets
  - name: BucketAccessControls
    description: Operations for managing bucket-level access control lists
  - name: ObjectAccessControls
    description: Operations for managing object-level access control lists
  - name: DefaultObjectAccessControls
    description: Operations for managing default object access controls on buckets
security:
  - oauth2: []
  - bearerAuth: []
paths:
  /b:
    get:
      operationId: listBuckets
      summary: List buckets
      description: >-
        Retrieves a list of buckets for a given project. The authenticated
        user must have the storage.buckets.list permission for the specified
        project.
      tags:
        - Buckets
      parameters:
        - name: project
          in: query
          required: true
          description: The project ID or project number to list buckets for.
          schema:
            type: string
          example: my-project-id
        - name: maxResults
          in: query
          required: false
          description: >-
            Maximum number of buckets to return in a single response.
            The service uses this value or 1,000 items, whichever is smaller.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 1000
        - name: pageToken
          in: query
          required: false
          description: >-
            A previously-returned page token representing part of the
            larger set of results to view. The pageToken is an encoded
            field that marks the name and generation of the last bucket
            in the previous list response.
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          description: Filter results to buckets whose names begin with this prefix.
          schema:
            type: string
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to noAcl.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: noAcl
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Successful response with a list of buckets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: insertBucket
      summary: Create a bucket
      description: >-
        Creates a new bucket in the specified project. The authenticated
        user must have the storage.buckets.create permission for the
        project. Bucket names must be globally unique across all of
        Cloud Storage.
      tags:
        - Buckets
      parameters:
        - name: project
          in: query
          required: true
          description: The project ID or project number to create the bucket in.
          schema:
            type: string
          example: my-project-id
        - name: predefinedAcl
          in: query
          required: false
          description: Apply a predefined set of access controls to the bucket.
          schema:
            type: string
            enum:
              - authenticatedRead
              - private
              - projectPrivate
              - publicRead
              - publicReadWrite
        - name: predefinedDefaultObjectAcl
          in: query
          required: false
          description: >-
            Apply a predefined set of default object access controls
            to the bucket.
          schema:
            type: string
            enum:
              - authenticatedRead
              - bucketOwnerFullControl
              - bucketOwnerRead
              - private
              - projectPrivate
              - publicRead
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to noAcl.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: noAcl
        - name: enableObjectRetention
          in: query
          required: false
          description: >-
            When set to true, object retention is enabled for this bucket.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bucket'
      responses:
        '200':
          description: Bucket created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bucket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: >-
            Conflict. A bucket with the specified name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /b/{bucket}:
    get:
      operationId: getBucket
      summary: Get a bucket
      description: >-
        Returns metadata for the specified bucket. The authenticated user
        must have the storage.buckets.get permission for the bucket.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: ifMetagenerationMatch
          in: query
          required: false
          description: >-
            Makes the return of the bucket metadata conditional on
            whether the bucket's current metageneration matches the
            given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the return of the bucket metadata conditional on
            whether the bucket's current metageneration does not match
            the given value.
          schema:
            type: integer
            format: int64
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to noAcl.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: noAcl
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Successful response with bucket metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bucket'
        '304':
          description: Not Modified. The bucket has not been modified since the specified metageneration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateBucket
      summary: Update a bucket
      description: >-
        Updates a bucket. Changes to the bucket will be readable
        immediately after writing, but configuration changes may take
        time to propagate. This method replaces all mutable properties
        of the bucket with the values in the request body.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: ifMetagenerationMatch
          in: query
          required: false
          description: >-
            Makes the update conditional on whether the bucket's current
            metageneration matches the given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the update conditional on whether the bucket's current
            metageneration does not match the given value.
          schema:
            type: integer
            format: int64
        - name: predefinedAcl
          in: query
          required: false
          description: Apply a predefined set of access controls to the bucket.
          schema:
            type: string
            enum:
              - authenticatedRead
              - private
              - projectPrivate
              - publicRead
              - publicReadWrite
        - name: predefinedDefaultObjectAcl
          in: query
          required: false
          description: >-
            Apply a predefined set of default object access controls.
          schema:
            type: string
            enum:
              - authenticatedRead
              - bucketOwnerFullControl
              - bucketOwnerRead
              - private
              - projectPrivate
              - publicRead
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to full.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: full
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bucket'
      responses:
        '200':
          description: Bucket updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bucket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    patch:
      operationId: patchBucket
      summary: Patch a bucket
      description: >-
        Patches a bucket. Changes to the bucket will be readable
        immediately after writing, but configuration changes may take
        time to propagate. This method supports patch semantics where
        only the specified fields are updated.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: ifMetagenerationMatch
          in: query
          required: false
          description: >-
            Makes the patch conditional on whether the bucket's current
            metageneration matches the given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the patch conditional on whether the bucket's current
            metageneration does not match the given value.
          schema:
            type: integer
            format: int64
        - name: predefinedAcl
          in: query
          required: false
          description: Apply a predefined set of access controls to the bucket.
          schema:
            type: string
            enum:
              - authenticatedRead
              - private
              - projectPrivate
              - publicRead
              - publicReadWrite
        - name: predefinedDefaultObjectAcl
          in: query
          required: false
          description: >-
            Apply a predefined set of default object access controls.
          schema:
            type: string
            enum:
              - authenticatedRead
              - bucketOwnerFullControl
              - bucketOwnerRead
              - private
              - projectPrivate
              - publicRead
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to full.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: full
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Bucket'
      responses:
        '200':
          description: Bucket patched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bucket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      operationId: deleteBucket
      summary: Delete a bucket
      description: >-
        Permanently deletes an empty bucket. The authenticated user must
        have the storage.buckets.delete permission for the bucket. The
        bucket must be empty before it can be deleted.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: ifMetagenerationMatch
          in: query
          required: false
          description: >-
            Makes the deletion conditional on whether the bucket's
            current metageneration matches the given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the deletion conditional on whether the bucket's
            current metageneration does not match the given value.
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/userProject'
      responses:
        '204':
          description: Bucket deleted successfully. No content returned.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >-
            Conflict. The bucket is not empty and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /b/{bucket}/lockRetentionPolicy:
    post:
      operationId: lockBucketRetentionPolicy
      summary: Lock retention policy
      description: >-
        Locks retention policy on a bucket. This action is irreversible.
        Once locked, the retention policy cannot be removed or the
        retention period shortened.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: ifMetagenerationMatch
          in: query
          required: true
          description: >-
            Makes the operation conditional on whether the bucket's
            current metageneration matches the given value.
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Retention policy locked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bucket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /b/{bucket}/iam:
    get:
      operationId: getBucketIamPolicy
      summary: Get bucket IAM policy
      description: >-
        Returns an IAM policy for the specified bucket. The authenticated
        user must have the storage.buckets.getIamPolicy permission.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: optionsRequestedPolicyVersion
          in: query
          required: false
          description: >-
            The IAM policy format version to be returned. Valid values
            are 1 and 3. Requests specifying an invalid value will be
            rejected. Defaults to 1.
          schema:
            type: integer
            enum:
              - 1
              - 3
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Successful response with the IAM policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: setBucketIamPolicy
      summary: Set bucket IAM policy
      description: >-
        Updates an IAM policy for the specified bucket. The authenticated
        user must have the storage.buckets.setIamPolicy permission.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - $ref: '#/components/parameters/userProject'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
      responses:
        '200':
          description: IAM policy updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /b/{bucket}/iam/testPermissions:
    get:
      operationId: testBucketIamPermissions
      summary: Test bucket IAM permissions
      description: >-
        Tests a set of permissions on the given bucket to see which,
        if any, are held by the caller. The authenticated user must
        have the storage.buckets.testIamPermissions permission.
      tags:
        - Buckets
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: permissions
          in: query
          required: true
          description: Permissions to test.
          schema:
            type: array
            items:
              type: string
          example:
            - storage.buckets.get
            - storage.objects.list
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Successful response with test results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind:
                    type: string
                    default: storage#testIamPermissionsResponse
                  permissions:
                    type: array
                    items:
                      type: string
                    description: >-
                      The permissions held by the caller. This is a
                      subset of the requested permissions.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /b/{bucket}/o:
    get:
      operationId: listObjects
      summary: List objects
      description: >-
        Retrieves a list of objects matching the criteria. The
        authenticated user must have the storage.objects.list permission
        for the bucket. Lists objects in a bucket, optionally filtering
        by a prefix and delimiter to emulate directory listing.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - name: delimiter
          in: query
          required: false
          description: >-
            Returns results in a directory-like mode. Items will
            contain only objects whose names, aside from the prefix,
            do not contain delimiter. Objects whose names, aside from
            the prefix, contain delimiter will have their name truncated
            after the delimiter, returned in prefixes. Duplicate prefixes
            are omitted.
          schema:
            type: string
          example: /
        - name: endOffset
          in: query
          required: false
          description: >-
            Filter results to objects whose names are lexicographically
            before endOffset. If startOffset is also set, the objects
            listed have names between startOffset (inclusive) and
            endOffset (exclusive).
          schema:
            type: string
        - name: includeFoldersAsPrefixes
          in: query
          required: false
          description: >-
            Only applicable if delimiter is set to /. If true, will
            also include folders and managed folders (besides objects)
            in the returned prefixes.
          schema:
            type: boolean
        - name: includeTrailingDelimiter
          in: query
          required: false
          description: >-
            If true, objects that end in exactly one instance of
            delimiter will have their metadata included in items in
            addition to prefixes.
          schema:
            type: boolean
        - name: matchGlob
          in: query
          required: false
          description: >-
            Filter results to objects and prefixes that match this glob
            pattern. Supports *, **, ?, and [...] character classes.
          schema:
            type: string
        - name: maxResults
          in: query
          required: false
          description: >-
            Maximum number of items plus prefixes to return in a single
            page of responses. The service may return fewer than this
            value.
          schema:
            type: integer
            minimum: 1
            default: 1000
        - name: pageToken
          in: query
          required: false
          description: >-
            A previously-returned page token representing part of the
            larger set of results to view.
          schema:
            type: string
        - name: prefix
          in: query
          required: false
          description: >-
            Filter results to objects whose names begin with this
            prefix.
          schema:
            type: string
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to noAcl.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: noAcl
        - name: softDeleted
          in: query
          required: false
          description: >-
            If true, only lists soft-deleted object versions.
          schema:
            type: boolean
        - name: startOffset
          in: query
          required: false
          description: >-
            Filter results to objects whose names are lexicographically
            equal to or after startOffset.
          schema:
            type: string
        - name: versions
          in: query
          required: false
          description: >-
            If true, lists all versions of an object as distinct results.
            The default is false.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: Successful response with a list of objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /b/{bucket}/o/{object}:
    get:
      operationId: getObject
      summary: Get an object
      description: >-
        Retrieves an object or its metadata. The authenticated user must
        have the storage.objects.get permission for the object. By default,
        this returns the object metadata. Use alt=media to download the
        object data.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - $ref: '#/components/parameters/objectName'
        - name: alt
          in: query
          required: false
          description: >-
            Data format for the response. Use json for metadata or
            media to download the object data.
          schema:
            type: string
            enum:
              - json
              - media
            default: json
        - name: generation
          in: query
          required: false
          description: >-
            If present, selects a specific revision of this object.
          schema:
            type: integer
            format: int64
        - name: ifGenerationMatch
          in: query
          required: false
          description: >-
            Makes the operation conditional on whether the object's
            current generation matches the given value. Setting to 0
            makes the operation succeed only if there are no live
            versions of the object.
          schema:
            type: integer
            format: int64
        - name: ifGenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the operation conditional on whether the object's
            current generation does not match the given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationMatch
          in: query
          required: false
          description: >-
            Makes the operation conditional on whether the object's
            current metageneration matches the given value.
          schema:
            type: integer
            format: int64
        - name: ifMetagenerationNotMatch
          in: query
          required: false
          description: >-
            Makes the operation conditional on whether the object's
            current metageneration does not match the given value.
          schema:
            type: integer
            format: int64
        - name: projection
          in: query
          required: false
          description: Set of properties to return. Defaults to noAcl.
          schema:
            type: string
            enum:
              - full
              - noAcl
            default: noAcl
        - name: softDeleted
          in: query
          required: false
          description: >-
            If true, retrieves the soft-deleted version of the object.
          schema:
            type: boolean
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/prettyPrint'
        - $ref: '#/components/parameters/userProject'
      responses:
        '200':
          description: >-
            Successful response with object metadata (alt=json) or
            object data (alt=media).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Object'
            application/octet-stream:
              schema:
                type: string
                format: binary
        '304':
          description: Not Modified. The object has not been modified since the specified conditions.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    put:
      operationId: updateObject
      summary: Update an object
      description: >-
        Updates an object's metadata. This method replaces all mutable
        metadata fields of the object with the values in the request body.
      tags:
        - Objects
      parameters:
        - $ref: '#/components/parameters/bucketName'
        - $ref: '#/components/parameters/objectName'
        - name: generation
          in: query
          required: false
          description: >-
            If present, selects a specific revision of this object.
