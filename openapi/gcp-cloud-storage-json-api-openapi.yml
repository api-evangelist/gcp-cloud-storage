            object's current metageneration does not match the given value.
          schema:
            type: integer
            format: int64
        - name: ifSourceGenerationMatch
          in: query
          required: false
          description: >-
            Makes the operation conditional on whether the source
            object's current generation matches the given value.
          schema:
            type: integer
            format: int64
        - name: ifSourceGenerationNotMatch
          in: query
          required: false
          description: >-
